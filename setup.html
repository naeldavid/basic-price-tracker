<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Price Tracker</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="static/style.css">
    <style>
        .setup-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
        }
        .setup-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
        }
        .setup-card h1 {
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .selection-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .selection-category h3 {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .selection-category label {
            display: block;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <h1>Welcome to Price Tracker</h1>
            
            <div class="form-group">
                <label for="userName">Your Name</label>
                <input type="text" id="userName" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="assetSearch">Search and add assets (comma‑separated, e.g., btc, gold, usd_jpy)</label>
                <input type="text" id="assetSearch" placeholder="Enter asset codes" style="width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text-primary);">
            </div>

            <button class="btn-primary" style="width: 100%;" onclick="completeSetup()">Start Tracking</button>
        </div>
    </div>

    <script>
        function completeSetup() {
            const userName = document.getElementById('userName').value.trim();
            const assetInput = document.getElementById('assetSearch').value.trim();
            const selectedAssets = assetInput ? assetInput.split(',').map(a => a.trim()).filter(a => a) : [];
            
            if (!userName) {
                alert('Please enter your name.');
                return;
            }
            
            if (selectedAssets.length === 0) {
                alert('Please select at least one asset.');
                return;
            }
            
            const params = new URLSearchParams();
            params.set('user', encodeURIComponent(userName));
            params.set('assets', encodeURIComponent(JSON.stringify(selectedAssets)));
            params.set('setup', 'true');
            
            window.location.href = 'index.html?' + params.toString();
        }
    </script>
</body>
</html>
