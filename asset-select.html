<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Assets - Price Tracker</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        .search-container { margin: 2rem auto; max-width: 600px; }
        #assetSearch { width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text-primary); }
        #suggestions { list-style: none; margin: 0; padding: 0; border: 1px solid var(--border); border-top: none; max-height: 200px; overflow-y: auto; background: var(--bg-secondary); }
        #suggestions li { padding: 0.5rem; cursor: pointer; }
        #suggestions li:hover { background: var(--bg-tertiary); }
        .selected-list { margin-top: 1rem; }
        .selected-item { display: inline-block; background: var(--accent); color: white; padding: 0.3rem 0.6rem; border-radius: 0.3rem; margin: 0.2rem; }
    </style>
</head>
<body>
<div class="search-container">
    <h2>Select assets to track</h2>
    <input type="text" id="assetSearch" placeholder="Start typing an asset code (e.g., btc, gold, usd_jpy)" autocomplete="off" />
    <ul id="suggestions"></ul>
    <div class="selected-list" id="selectedAssets"></div>
    <button class="btn-primary" style="margin-top:1rem; width:100%;" onclick="finishSelection()">Start Tracking</button>
</div>
<script>
// Minimal asset map – same as in core.js
const ALL_ASSETS = {
    btc: 'Bitcoin', eth: 'Ethereum', bnb: 'Binance Coin', ada: 'Cardano', sol: 'Solana', xrp: 'Ripple', dot: 'Polkadot', doge: 'Dogecoin', avax: 'Avalanche', matic: 'Polygon',
    gold: 'Gold', silver: 'Silver', platinum: 'Platinum', palladium: 'Palladium',
    usd_eur: 'USD/EUR', usd_gbp: 'USD/GBP', usd_jpy: 'USD/JPY', usd_cad: 'USD/CAD', usd_aud: 'USD/AUD', usd_chf: 'USD/CHF', usd_cny: 'USD/CNY', usd_inr: 'USD/INR', usd_aed: 'USD/AED', usd_bhd: 'USD/BHD',
    usd_krw: 'USD/KRW', usd_brl: 'USD/BRL', usd_mxn: 'USD/MXN', usd_rub: 'USD/RUB', usd_try: 'USD/TRY', usd_zar: 'USD/ZAR', usd_nok: 'USD/NOK', usd_sek: 'USD/SEK',
    bigmac_us: 'BigMac US', bigmac_uk: 'BigMac UK', bigmac_jp: 'BigMac JP', bigmac_eu: 'BigMac EU', bigmac_ca: 'BigMac CA'
};
let selected = [];
const searchInput = document.getElementById('assetSearch');
const suggestionsEl = document.getElementById('suggestions');
const selectedEl = document.getElementById('selectedAssets');

function renderSuggestions(filter) {
    suggestionsEl.innerHTML = '';
    if (!filter) return;
    const lower = filter.toLowerCase();
    const matches = Object.keys(ALL_ASSETS).filter(key => key.startsWith(lower) && !selected.includes(key));
    matches.slice(0, 10).forEach(key => {
        const li = document.createElement('li');
        li.textContent = `${key.toUpperCase()} – ${ALL_ASSETS[key]}`;
        li.onclick = () => addAsset(key);
        suggestionsEl.appendChild(li);
    });
}

function addAsset(key) {
    if (!selected.includes(key)) {
        selected.push(key);
        updateSelected();
        searchInput.value = '';
        suggestionsEl.innerHTML = '';
    }
}

function updateSelected() {
    selectedEl.innerHTML = selected.map(k => `<span class="selected-item">${k.toUpperCase()}</span>`).join('');
}

searchInput.addEventListener('input', (e) => {
    renderSuggestions(e.target.value.trim());
});

function finishSelection() {
    if (selected.length === 0) {
        alert('Please select at least one asset.');
        return;
    }
    localStorage.setItem('userSelectedAssets', JSON.stringify(selected));
    // redirect to main app
    window.location.href = 'index.html';
}
</script>
</body>
</html>
